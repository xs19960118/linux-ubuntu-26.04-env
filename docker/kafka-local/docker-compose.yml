services:
  kafka:
    image: ${KAFKA_IMAGE}
    container_name: dev-kafka-local
    restart: unless-stopped
    ports: ["${BIND_HOST}:19092:9092"]
    environment:
      KAFKA_ENABLE_KRAFT: "yes"
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://127.0.0.1:19092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes: ["./data:/bitnami/kafka", "./logs:/opt/bitnami/kafka/logs"]
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server 127.0.0.1:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks: [dev_kafka_local_net]
  kafka-ui:
    image: ${KAFKA_UI_IMAGE}
    container_name: dev-kafka-local-ui
    restart: unless-stopped
    ports: ["${BIND_HOST}:${KAFKA_UI_HOST_PORT}:8080"]
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on: { kafka: { condition: service_healthy } }
    networks: [dev_kafka_local_net]
networks:
  dev_kafka_local_net:
    name: dev_kafka_local_net
