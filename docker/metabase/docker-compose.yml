services:
  metabase-postgres:
    image: ${POSTGRES_IMAGE}
    container_name: dev-metabase-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes: ["./data/postgres:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} -h 127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks: [dev_metabase_net]
  metabase:
    image: ${METABASE_IMAGE}
    container_name: dev-metabase
    restart: unless-stopped
    ports: ["${BIND_HOST}:13001:3000"]
    environment:
      MB_DB_TYPE: ${MB_DB_TYPE}
      MB_DB_DBNAME: ${MB_DB_DBNAME}
      MB_DB_PORT: ${MB_DB_PORT}
      MB_DB_USER: ${MB_DB_USER}
      MB_DB_PASS: ${MB_DB_PASS}
      MB_DB_HOST: ${MB_DB_HOST}
    volumes: ["./logs:/metabase-logs"]
    depends_on: { metabase-postgres: { condition: service_healthy } }
    networks: [dev_metabase_net]
networks:
  dev_metabase_net:
    name: dev_metabase_net
