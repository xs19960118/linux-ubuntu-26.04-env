services:
  nginx:
    image: ${NGINX_IMAGE}
    pull_policy: missing
    container_name: ${NGINX_CONTAINER_NAME}
    restart: unless-stopped
    ports:
      - "${BIND_HOST}:${NGINX_HTTP_HOST_PORT}:${NGINX_HTTP_CONTAINER_PORT}"
      - "${BIND_HOST}:${NGINX_HTTPS_HOST_PORT}:${NGINX_HTTPS_CONTAINER_PORT}"
    volumes:
      - ./conf/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./conf/conf.d:/etc/nginx/conf.d:ro
      - ./html:/usr/share/nginx/html:ro
      - ./logs:/var/log/nginx
      - ./runtime:/var/cache/nginx
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health | grep ok"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - dev_nginx_net

networks:
  dev_nginx_net:
    name: dev_nginx_net
