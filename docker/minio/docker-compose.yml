services:
  minio:
    image: ${MINIO_IMAGE}
    container_name: dev-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "${BIND_HOST}:19000:9000"
      - "${BIND_HOST}:19001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./data:/data
      - ./logs:/var/log/minio
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks: [dev_minio_net]
networks:
  dev_minio_net:
    name: dev_minio_net
