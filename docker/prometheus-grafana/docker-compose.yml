services:
  prometheus:
    image: ${PROMETHEUS_IMAGE}
    container_name: dev-prometheus
    restart: unless-stopped
    ports: ["${BIND_HOST}:19090:9090"]
    command: ["--config.file=/etc/prometheus/prometheus.yml", "--storage.tsdb.path=/prometheus"]
    volumes: ["./conf/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro", "./data/prometheus:/prometheus"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/-/healthy | grep Prometheus"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks: [dev_prometheus_grafana_net]
  grafana:
    image: ${GRAFANA_IMAGE}
    container_name: dev-grafana
    restart: unless-stopped
    ports: ["${BIND_HOST}:13000:3000"]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes: ["./data/grafana:/var/lib/grafana", "./conf/grafana/provisioning:/etc/grafana/provisioning:ro"]
    depends_on: { prometheus: { condition: service_healthy } }
    networks: [dev_prometheus_grafana_net]
  node-exporter:
    image: ${NODE_EXPORTER_IMAGE}
    container_name: dev-node-exporter
    restart: unless-stopped
    ports: ["${BIND_HOST}:19100:9100"]
    networks: [dev_prometheus_grafana_net]
networks:
  dev_prometheus_grafana_net:
    name: dev_prometheus_grafana_net
