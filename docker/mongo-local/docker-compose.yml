services:
  mongo:
    image: ${MONGO_IMAGE}
    container_name: ${MONGO_CONTAINER_NAME}
    restart: unless-stopped
    ports:
      - "${BIND_HOST}:${MONGO_HOST_PORT}:${MONGO_CONTAINER_PORT}"
    environment:
      TZ: ${MONGO_TZ}
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
    command: ["mongod", "--config", "/etc/mongo/mongod.conf"]
    volumes:
      - ./conf/mongod.conf:/etc/mongo/mongod.conf:ro
      - ./data:/data/db
      - ./logs:/var/log/mongodb
      - ./runtime:/tmp/mongodb
      - ./scripts/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet -u $${MONGO_INITDB_ROOT_USERNAME} -p $${MONGO_INITDB_ROOT_PASSWORD} --authenticationDatabase admin --eval 'db.adminCommand({ ping: 1 }).ok' | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - dev_mongo_local_net

networks:
  dev_mongo_local_net:
    name: dev_mongo_local_net
